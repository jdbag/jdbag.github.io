<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient: pink left → purple center → blue right -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f472b6"/>
      <stop offset="30%"  stop-color="#c084fc"/>
      <stop offset="65%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Glow behind book -->
    <radialGradient id="bookGlow" cx="65%" cy="42%" r="28%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Top-left soft light -->
    <radialGradient id="topLight" cx="15%" cy="10%" r="45%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Network line opacity -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Soft top-left highlight -->
  <rect width="1024" height="1024" fill="url(#topLight)"/>

  <!-- ── NETWORK LINES & NODES ── -->
  <g stroke="rgba(255,255,255,0.38)" stroke-width="1.8" fill="none" filter="url(#softBlur)">
    <!-- Lines -->
    <line x1="60"  y1="200" x2="280" y2="420"/>
    <line x1="280" y1="420" x2="180" y2="650"/>
    <line x1="180" y1="650" x2="400" y2="800"/>
    <line x1="400" y1="800" x2="600" y2="750"/>
    <line x1="60"  y1="200" x2="180" y2="100"/>
    <line x1="180" y1="100" x2="420" y2="60"/>
    <line x1="280" y1="420" x2="500" y2="380"/>
    <line x1="500" y1="380" x2="680" y2="500"/>
    <line x1="680" y1="500" x2="850" y2="420"/>
    <line x1="850" y1="420" x2="970" y2="320"/>
    <line x1="850" y1="420" x2="920" y2="620"/>
    <line x1="920" y1="620" x2="820" y2="780"/>
    <line x1="820" y1="780" x2="600" y2="750"/>
    <line x1="600" y1="750" x2="400" y2="800"/>
    <line x1="970" y1="320" x2="820" y2="160"/>
    <line x1="820" y1="160" x2="680" y2="80"/>
    <line x1="680" y1="80"  x2="420" y2="60"/>
    <line x1="180" y1="650" x2="60"  y2="780"/>
    <line x1="60"  y1="780" x2="240" y2="920"/>
    <line x1="240" y1="920" x2="400" y2="800"/>
    <line x1="500" y1="380" x2="420" y2="60"/>
    <line x1="680" y1="500" x2="600" y2="750"/>
  </g>
  <!-- Nodes -->
  <g fill="rgba(255,255,255,0.55)">
    <circle cx="60"  cy="200" r="5"/>
    <circle cx="280" cy="420" r="7"/>
    <circle cx="180" cy="650" r="5"/>
    <circle cx="400" cy="800" r="6"/>
    <circle cx="600" cy="750" r="8"/>
    <circle cx="180" cy="100" r="5"/>
    <circle cx="420" cy="60"  r="5"/>
    <circle cx="500" cy="380" r="6"/>
    <circle cx="680" cy="500" r="5"/>
    <circle cx="850" cy="420" r="9"/>
    <circle cx="970" cy="320" r="5"/>
    <circle cx="920" cy="620" r="6"/>
    <circle cx="820" cy="780" r="5"/>
    <circle cx="820" cy="160" r="5"/>
    <circle cx="680" cy="80"  r="5"/>
    <circle cx="60"  cy="780" r="5"/>
    <circle cx="240" cy="920" r="5"/>
  </g>

  <!-- Glow spot behind book icon -->
  <rect width="1024" height="1024" fill="url(#bookGlow)"/>

  <!-- ── BOOK ICON (top-right area, matching original) ── -->
  <g transform="translate(568, 110)">
    <!-- Base/stand of book -->
    <rect x="10" y="282" width="302" height="34" rx="10" fill="#1a3a8f"/>

    <!-- Book pages (fan of lines from spine center) -->
    <!-- The open book: left pages arc left, right pages arc right, spine at center bottom -->

    <!-- Right page arcs (lines fanning right-upward) -->
    <path d="M156,272 Q230,180 318,148" stroke="#1a3a8f" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M156,272 Q228,170 308,130" stroke="#1a3a8f" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M156,272 Q224,158 296,112" stroke="#1a3a8f" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M156,272 Q218,148 280,96"  stroke="#1a3a8f" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M156,272 Q210,140 264,84"  stroke="#1a3a8f" stroke-width="9"  fill="none" stroke-linecap="round"/>

    <!-- Left page arcs (mirror, fan left-upward) -->
    <path d="M156,272 Q82,180  -6,148"  stroke="#1a3a8f" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M156,272 Q84,170  -4,130"  stroke="#1a3a8f" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M156,272 Q88,158  16,112"  stroke="#1a3a8f" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M156,272 Q94,148  32,96"   stroke="#1a3a8f" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M156,272 Q102,140 48,84"   stroke="#1a3a8f" stroke-width="9"  fill="none" stroke-linecap="round"/>

    <!-- Spine line -->
    <line x1="156" y1="272" x2="156" y2="216" stroke="#1a3a8f" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- ── TEXT: "Your" ── -->
  <text
    x="88" y="490"
    font-family="'Nunito', 'Trebuchet MS', Arial, sans-serif"
    font-size="196"
    font-weight="800"
    fill="#1a3a8f"
    letter-spacing="-2"
  >Your</text>

  <!-- ── TEXT: "Dictionary" ── -->
  <text
    x="88" y="700"
    font-family="'Nunito', 'Trebuchet MS', Arial, sans-serif"
    font-size="196"
    font-weight="800"
    fill="#1a3a8f"
    letter-spacing="-4"
  >Dictionary</text>
</svg>
