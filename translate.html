<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate - Your Dictionary</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3640039090708511" crossorigin="anonymous"></script>
    <style>
        .translate-card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            margin-top: -30px;
        }
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            font-size: 18px;
            font-family: inherit;
            resize: vertical;
            min-height: 150px;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: var(--blue-mid); }
        #transResult {
            margin-top: 25px;
            padding: 20px;
            background: #f0f7ff;
            border-radius: 16px;
            color: var(--blue-dark);
            font-size: 20px;
            font-weight: 700;
            min-height: 60px;
            display: none; /* يظهر فقط عند وجود نتيجة */
            line-height: 1.6;
        }
        .loader {
            display: none;
            margin: 10px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--blue-mid);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="logo.svg" alt="Your Dictionary">
            <span class="logo-text">Your<br><strong>Dictionary</strong></span>
        </a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="translate.html" class="nav-link active">Translate</a>
            <a href="quiz.html" class="nav-link">Quiz</a>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1 class="hero-title">Quick Translator</h1>
        <p class="hero-sub">Translate text between English and Arabic instantly.</p>
    </div>
</section>

<section class="container" style="margin-bottom: 50px;">
    <div class="translate-card">
        <textarea id="transInput" placeholder="Enter text to translate (English or Arabic)..."></textarea>
        
        <div class="loader" id="loader"></div>
        
        <button class="search-btn" style="width:100%; margin-top: 20px;" onclick="startTranslate()">
            Translate Now / ترجم الآن
        </button>

        <div id="transResult"></div>
    </div>
</section>

<footer class="footer">
    <div class="container footer-inner">
        <p>&copy; 2025 Your Dictionary. Clean & Simple.</p>
        <div class="footer-links">
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
        </div>
    </div>
</footer>

<script>
async function startTranslate() {
    const text = document.getElementById('transInput').value.trim();
    const resultDiv = document.getElementById('transResult');
    const loader = document.getElementById('loader');
    
    if (!text) {
        alert("Please enter some text / يرجى كتابة نص");
        return;
    }

    // إظهار اللودر وإخفاء النتيجة القديمة
    loader.style.display = "block";
    resultDiv.style.display = "none";

    try {
        // تحديد اللغة تلقائياً (من الإنجليزية للعربية أو العكس)
        // إذا بدأ النص بحروف عربية يترجم للإنجليزية، والعكس صحيح
        const isArabic = /[\u0600-\u06FF]/.test(text);
        const langPair = isArabic ? "ar|en" : "en|ar";

        const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`);
        const data = await response.json();
        
        loader.style.display = "none";
        
        if (data.responseData) {
            resultDiv.innerText = data.responseData.translatedText;
            resultDiv.style.display = "block";
        } else {
            resultDiv.innerText = "Error in translation. Try again.";
            resultDiv.style.display = "block";
        }
    } catch (error) {
        loader.style.display = "none";
        resultDiv.innerText = "Connection error. Please check your internet.";
        resultDiv.style.display = "block";
        console.error(error);
    }
}
</script>

</body>
</html>
