<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translate – Your Dictionary</title>
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3640039090708511" crossorigin="anonymous"></script>
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <img src="logo.svg" alt="Logo">
      <span class="logo-text">Your<br><strong>Dictionary</strong></span>
    </a>
    <nav class="nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="translate.html" class="nav-link active">Translate</a>
      <a href="quiz.html" class="nav-link">Quiz</a>
    </nav>
  </div>
</header>

<section class="hero" style="padding: 40px 20px;">
  <div class="container">
    <h1 style="color: var(--blue-dark); font-weight: 900;">Quick Translator</h1>
    <p style="margin-bottom: 20px;">Translate between English and Arabic instantly.</p>
    <textarea id="transInput" style="width:100%; height:150px; border-radius:20px; padding:20px; border:1px solid var(--border); font-family:inherit;" placeholder="Type here..."></textarea>
    <button class="search-btn" style="margin-top:15px; width:100%;" onclick="startTranslate()">Translate Now</button>
    <div id="transResult" style="margin-top:20px; font-weight:700; color:var(--blue-mid); font-size:20px;"></div>
  </div>
</section>

<footer class="footer">
  <div class="container footer-inner">
    <p>&copy; 2025 Your Dictionary.</p>
    <div class="footer-links"><a href="privacy.html">Privacy</a></div>
  </div>
</footer>
<script>
function startTranslate() {
  const text = document.getElementById('transInput').value;
  if(text) document.getElementById('transResult').innerText = "Translation feature connecting...";
}
</script>
</body>
</html>
