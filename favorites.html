<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites – Your Dictionary</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
.page-hero { background: linear-gradient(135deg,#fce4ec,#e8d5f5,#d0e8ff); padding:48px 24px 40px; text-align:center; }
.page-hero h1 { font-size:clamp(24px,4vw,38px); font-weight:900; color:var(--blue-dark); }
.page-hero p { color:var(--text-mid); font-weight:600; margin-top:8px; }
.fav-section { padding:40px 0 60px; }
.fav-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
.fav-item { background:var(--white); border-radius:16px; padding:20px; box-shadow:var(--shadow); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:space-between; gap:10px; border:2px solid transparent; }
.fav-item:hover { border-color:var(--blue-mid); transform:translateY(-2px); }
.fav-word { font-weight:800; font-size:16px; color:var(--blue-dark); }
.fav-del { background:none; border:none; cursor:pointer; color:var(--text-light); padding:4px; border-radius:8px; transition:color 0.2s; }
.fav-del:hover { color:#ef4444; }
.fav-del svg { width:18px; height:18px; }
.empty-state { text-align:center; padding:80px 24px; }
.empty-state .emoji { font-size:52px; margin-bottom:16px; }
.empty-state h3 { font-weight:900; font-size:22px; color:var(--text-dark); margin-bottom:8px; }
.empty-state p { color:var(--text-light); font-weight:600; }
.empty-state a { display:inline-block; margin-top:20px; background:var(--gradient); color:#fff; text-decoration:none; padding:12px 28px; border-radius:50px; font-weight:800; font-size:15px; }
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3640039090708511" crossorigin="anonymous"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 40 32" fill="none">
        <rect x="2" y="24" width="36" height="4" rx="2" fill="#1a3a8f"/>
        <path d="M4 20 C4 20 20 16 36 20" stroke="#1a3a8f" stroke-width="2.5" fill="none"/>
        <path d="M20 4 L20 18" stroke="#1a3a8f" stroke-width="2"/>
      </svg>
      <span class="logo-text">Your<br><strong>Dictionary</strong></span>
    </div>
    <nav class="nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="favorites.html" class="nav-link active">Favorites</a>
      <a href="quiz.html" class="nav-link">Quiz</a>
      <a href="about.html" class="nav-link">About</a>
    </nav>
    <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
  </div>
</header>
<div class="mobile-nav" id="mobileNav">
  <a href="index.html">Home</a>
  <a href="favorites.html">Favorites</a>
  <a href="quiz.html">Quiz</a>
  <a href="about.html">About</a>
</div>

<div class="page-hero">
  <h1>❤️ Favorite Words</h1>
  <p>Your saved words, always at hand.</p>
</div>

<section class="fav-section">
  <div class="container">
    <div id="favContent"></div>
  </div>
</section>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo"><span>Your Dictionary</span></div>
    <p class="footer-copy">© 2025 Your Dictionary.</p>
    <div class="footer-links"><a href="about.html">About</a><a href="#">Privacy</a></div>
  </div>
</footer>

<script>
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('mobileNav').classList.toggle('open');
});

let favorites = JSON.parse(localStorage.getItem('yd_favorites') || '[]');

function render() {
  const c = document.getElementById('favContent');
  if (!favorites.length) {
    c.innerHTML = `<div class="empty-state"><div class="emoji">📚</div><h3>No favorites yet</h3><p>Search a word and tap the heart to save it.</p><a href="index.html">Search words →</a></div>`;
    return;
  }
  c.innerHTML = `
    <div class="section-label">✦ ${favorites.length} saved word${favorites.length > 1 ? 's' : ''}</div>
    <div class="fav-grid">${favorites.map(w => `
      <div class="fav-item" onclick="go('${w}')">
        <span class="fav-word">${w}</span>
        <button class="fav-del" onclick="event.stopPropagation();remove('${w}')" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>`).join('')}
    </div>
  `;
}

function remove(w) {
  favorites = favorites.filter(f => f !== w);
  localStorage.setItem('yd_favorites', JSON.stringify(favorites));
  render();
}

function go(w) {
  location.href = `index.html?q=${encodeURIComponent(w)}`;
}

render();
</script>
</body>
</html>
